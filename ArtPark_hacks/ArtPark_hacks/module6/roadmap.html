        <div class="card" style="width: 100%">
            
            
            <div id="mynetwork" class="card-body"></div>
        </div>

        
        

        <script type="text/javascript">

              // initialize global variables.
              var edges;
              var nodes;
              var allNodes;
              var allEdges;
              var nodeColors;
              var originalNodes;
              var network;
              var container;
              var options, data;
              var filter = {
                  item : '',
                  property : '',
                  value : []
              };

              

              

              // This method is responsible for drawing the graph, returns the drawn network
              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "green", "id": "git", "label": "git", "shape": "dot", "size": 24, "title": "Pro Git Book\u003cbr\u003eGit SCM Documentation"}, {"color": "green", "id": "java", "label": "java", "shape": "dot", "size": 24, "title": "Dev.java Tutorials\u003cbr\u003eJava Programming MOOC"}, {"color": "yellow", "id": "system design", "label": "system design", "shape": "dot", "size": 30, "title": "System Design Primer\u003cbr\u003eAWS Architecture Center"}, {"color": "yellow", "id": "software architecture", "label": "software architecture", "shape": "dot", "size": 30, "title": "Fundamentals of Software Architecture\u003cbr\u003eSystem Design Primer"}, {"color": "green", "id": "debugging", "label": "debugging", "shape": "dot", "size": 24, "title": "The Debugging Book\u003cbr\u003eVS Code Debugging Guide"}, {"color": "yellow", "id": "apis", "label": "apis", "shape": "dot", "size": 30, "title": "Postman API Fundamentals Student Expert\u003cbr\u003eMDN Web Docs: APIs"}]);
                  edges = new vis.DataSet([{"arrows": "to", "from": "java", "to": "apis", "value": 2.0}, {"arrows": "to", "from": "java", "to": "software architecture", "value": 2.0}, {"arrows": "to", "from": "software architecture", "to": "system design", "value": 2.0}, {"arrows": "to", "from": "debugging", "to": "system design", "value": 1.0}, {"arrows": "to", "from": "apis", "to": "software architecture", "value": 2.0}]);

                  nodeColors = {};
                  allNodes = nodes.get({ returnType: "Object" });
                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;
                  }
                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {
    "configure": {
        "enabled": false
    },
    "edges": {
        "color": {
            "inherit": true
        },
        "smooth": {
            "enabled": true,
            "type": "dynamic"
        }
    },
    "interaction": {
        "dragNodes": true,
        "hideEdgesOnDrag": false,
        "hideNodesOnDrag": false
    },
    "physics": {
        "enabled": true,
        "forceAtlas2Based": {
            "avoidOverlap": 0,
            "centralGravity": 0.01,
            "damping": 0.4,
            "gravitationalConstant": -50,
            "springConstant": 0.08,
            "springLength": 100
        },
        "solver": "forceAtlas2Based",
        "stabilization": {
            "enabled": true,
            "fit": true,
            "iterations": 1000,
            "onlyDynamicEdges": false,
            "updateInterval": 50
        }
    }
};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
              drawGraph();
        </script>
